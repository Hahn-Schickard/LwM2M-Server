include: "ci-variables.yml"

stages:
  - build
  - test
  - analyze
  - document
  - package
  - deploy

build:
  stage: build
  tags:
    - conan
  before_script:
    - pip3 install --upgrade conan
    - conan remote add upload_repo ${CONAN_REMOTE}
    - mkdir build
    - cd build
  script:
    - cmake ${CMAKE_VARIABLES} ..
    - cmake --build . --target all --config Debug --
  artifacts:
    paths:
      - build/

run_tests:
  stage: test
  needs: ["build"]
  tags:
    - conan
  before_script:
    - cd build
  script:
    - ctest --verbose
  artifacts:
    paths:
      - build/

analyze_memory_usage:
  stage: analyze
  needs: ["build"]
  tags:
    - conan
  script:
    - python3 utility/runValgrind.py ${VALGRIND_TARGET} --nargs ${VALGRIND_TARGET_ARGS}
  artifacts:
    name: "Commit:${CI_COMMIT_SHORT_SHA}_Debug_Valgrind_Results"
    paths:
      - valgrind-results.log
  only:
    variables:
      - $RUN_VALGRIND == "true"
  allow_failure: true

check_code_coverage:
  stage: analyze
  needs: ["build", "run_tests"]
  tags:
    - conan
  before_script:
    - chmod +x ${VALGRIND_TARGET}
    - ./${VALGRIND_TARGET}
  script:
    - python3 utility/checkCodeCoverage.py
  artifacts:
    name: "Commit:${CI_COMMIT_SHORT_SHA}_Code_Coverage_Results"
    paths:
      - code_coverage_report/

generate_autodoc:
  stage: document
  tags:
    - conan
  script:
    - doxygen utility/Doxyfile
  artifacts:
    name: "Commit:${CI_COMMIT_SHORT_SHA}_Code_Documentation"
    paths:
      - docs/code_documentation/
    expire_in: 30 days
  allow_failure: true

.package:
  stage: package
  variables:
    GIT_STRATEGY: clone
  tags:
    - conan
  before_script:
    - pip3 install --upgrade conan
    - conan remote add upload_repo ${CONAN_REMOTE}
    - PROJECT_NAME=$(python3 ./utility/getProjectName.py)
  allow_failure: true

package:stable:
  extends: .package
  script:
    - VERSION=$(python3 ./utility/getVersionFromTag.py)
    - conan create ./conan/ ${VERSION}@hahn-schickard/stable
    - conan upload ${PROJECT_NAME}/${VERSION}@hahn-schickard/stable -r upload_repo
  only:
    - /Release_v*/

pages:
  stage: deploy
  needs: ["build", "run_tests", "check_code_coverage", "generate_autodoc"]
  tags:
    - conan
  script:
    - python3 utility/createAmalgamWebsite.py ${CI_PROJECT_URL}
  artifacts:
    paths:
      - public
  only:
    - /Release_v*/
