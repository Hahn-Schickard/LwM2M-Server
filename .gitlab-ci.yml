build:ubuntu-20.04:
  extends: .build
  image: ${DOCKER_REGISTRY}/hs-conan-ubuntu-20.04:${IMAGE_VER}

build:fedora-32:
  extends: .build
  image:
    name: ${DOCKER_REGISTRY}/hs-conan-fedora-32:${IMAGE_VER}
    entrypoint: ["/bin/sh", "-c"]

build:fedora-34:
  extends: .build
  image:
    name: ${DOCKER_REGISTRY}/hs-conan-fedora-34:${IMAGE_VER}
